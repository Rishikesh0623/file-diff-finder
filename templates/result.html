<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Diff Result</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: auto;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
        }

        /* Semantic mode styles */
        .added {
            background: #e6ffed;
            color: #1a7f37;
            padding: 6px 10px;
            font-family: monospace;
        }

        .removed {
            background: #ffeef0;
            color: #cf222e;
            padding: 6px 10px;
            font-family: monospace;
        }

        .diff-block {
            margin-bottom: 20px;
            border-radius: 6px;
            overflow: hidden;
        }

        /* Structural mode styles */
        .html-diff {
            overflow-x: auto;
        }

        table.diff {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
            font-size: 14px;
        }

        table.diff th {
            background: #f0f2f5;
            padding: 8px;
            text-align: left;
        }

        table.diff td {
            padding: 4px 8px;
            vertical-align: top;
        }

        .diff_add {
            background-color: #e6ffed !important;
        }

        .diff_sub {
            background-color: #ffeef0 !important;
        }

        .diff_chg {
            background-color: #fff5b1 !important;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #0969da;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Comparison Result</h2>

    {% if engine == "structural" %}

        <div class="html-diff">
            {{ structural_html | safe }}
        </div>

    {% else %}

        <div class="diff-block">
            {% for item in diff %}
                {% if item.type == "added" %}
                    <div class="added">+ {{ item.content }}</div>
                {% elif item.type == "removed" %}
                    <div class="removed">- {{ item.content }}</div>
                {% endif %}
            {% endfor %}
        </div>

    {% endif %}

    <a href="/">Compare Again</a>

</div>

</body>
</html>
