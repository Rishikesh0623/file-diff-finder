<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>File Diff Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
        }

        input, select, button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
        }

        button {
            background: #0969da;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0550ae;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>File Diff Finder</h2>

    <form method="POST" action="/compare" enctype="multipart/form-data">

        <label>Original File</label>
        <input type="file" name="file1" required>

        <label>Modified File</label>
        <input type="file" name="file2" required>

        <label>Diff Mode</label>
        <select name="engine" required>
            <option value="semantic">Semantic Diff (Config Mode)</option>
            <option value="structural">Structural Diff (Code Mode)</option>
        </select>

        <button type="submit">Compare</button>

    </form>
</div>

</body>
</html>
